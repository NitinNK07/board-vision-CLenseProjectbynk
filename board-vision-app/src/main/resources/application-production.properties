# =====================================================
# CLens Board Vision - Production Configuration (Render)
# =====================================================

# =====================================================
# SERVER CONFIGURATION
# =====================================================
# Bind to all interfaces (required for Docker/Render)
server.address=0.0.0.0
server.port=${PORT:10000}

# =====================================================
# DATABASE CONFIGURATION
# =====================================================
# PostgreSQL Configuration using individual env vars
# Render requires SSL for PostgreSQL connections
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=require
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate DDL Auto - 'update' preserves data
spring.jpa.hibernate.ddl-auto=update

# Show SQL (disabled in production)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# HikariCP Connection Pool Settings (Production)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# =====================================================
# JWT SECURITY CONFIGURATION
# =====================================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=60
app.jwt.refresh.expiration=1440

# =====================================================
# TRIAL CONFIGURATION
# =====================================================
app.trial.days=2
app.trial.dailyLimit=3

# =====================================================
# MAIL CONFIGURATION (Gmail SMTP)
# =====================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =====================================================
# TWILIO SMS CONFIGURATION
# =====================================================
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.phone.number=${TWILIO_PHONE_NUMBER:}

# =====================================================
# AI VISION API CONFIGURATION
# =====================================================
# Groq API (PRIMARY)
groq.api.key=${GROQ_API_KEY}

# Google Gemini API (SECONDARY)
gemini.api.key=${GEMINI_API_KEY}

# HuggingFace API (FALLBACK - Not used)
huggingface.api.token=${HUGGINGFACE_TOKEN:}

# =====================================================
# FILE UPLOAD CONFIGURATION
# =====================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =====================================================
# LOGGING CONFIGURATION
# =====================================================
logging.level.org.springframework.security=INFO
logging.level.CLens.pgn_backend=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
