# =====================================================
# CLens Board Vision - Backend Configuration
# =====================================================

# =====================================================
# DATABASE CONFIGURATION
# =====================================================
# PostgreSQL Configuration (Production-Ready)
spring.datasource.url=jdbc:postgresql://localhost:5432/clens_chess_db
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate DDL Auto - 'update' preserves data on restart
# Options: validate | update | create | create-drop
spring.jpa.hibernate.ddl-auto=update

# Show SQL (set to false in production)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (Disabled in production, enabled for fallback testing)
spring.h2.console.enabled=false

# =====================================================
# SERVER CONFIGURATION
# =====================================================
server.port=8082

# =====================================================
# JWT SECURITY CONFIGURATION
# =====================================================
# Use environment variable in production, fallback for development
app.jwt.secret=${JWT_SECRET:ThisIsAVeryLongAndSecureSecretKeyForJWTTokenGenerationAndValidationInDevelopmentMode1234567890ABCDEF}
app.jwt.expiration=60
# Refresh token expiration (24 hours)
app.jwt.refresh.expiration=1440

# =====================================================
# TRIAL CONFIGURATION
# =====================================================
app.trial.days=2
app.trial.dailyLimit=3

# =====================================================
# MAIL CONFIGURATION (Gmail SMTP)
# =====================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =====================================================
# TWILIO SMS CONFIGURATION
# =====================================================
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.phone.number=${TWILIO_PHONE_NUMBER:}

# =====================================================
# HUGGINGFACE VISION API CONFIGURATION
# =====================================================
# Not used - Using Groq LLM instead
huggingface.api.token=${HUGGINGFACE_TOKEN:}

# =====================================================
# FILE UPLOAD CONFIGURATION
# =====================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =====================================================
# LOGGING CONFIGURATION
# =====================================================
logging.level.org.springframework.security=INFO
logging.level.CLens.pgn_backend=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO

# =====================================================
# AI VISION API CONFIGURATION
# =====================================================
# Groq API (PRIMARY - 100% FREE, no billing needed!)
# Get free key: https://console.groq.com/keys
# Free tier: 30 req/min, 14400 req/day, Llama 4 Scout vision
# Set GROQ_API_KEY environment variable in production
groq.api.key=${GROQ_API_KEY:}

# Google Gemini API (SECONDARY - may need billing in some regions)
# Get free key: https://aistudio.google.com/apikey
gemini.api.key=${GEMINI_API_KEY:}

# HuggingFace API (FALLBACK)
# Get free token: https://huggingface.co/settings/tokens
huggingface.api.token=
